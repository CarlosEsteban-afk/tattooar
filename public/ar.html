<!-- public/ar.html -->
<html>

<head>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        a-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
            margin: 0;
        }
    </style>
</head>

<body>
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-assets>
            <img id="tattoo-img" src="" crossorigin="anonymous" />
        </a-assets>

        <a-marker preset="hiro">
            <a-image src="#tattoo-img" position="0 0.05 0" rotation="-90 0 0" scale="1 1 1"
                transparent="true"></a-image>


        </a-marker>

        <a-entity camera position="0 0 0" scale="1 1 1"></a-entity>
    </a-scene>

    <script>
        const params = new URLSearchParams(window.location.search);
        const imgUrl = params.get('img');
        const imgElement = document.getElementById('tattoo-img');

        if (imgUrl) {
            imgElement.src = imgUrl;

            imgElement.onload = () => {
                const w = imgElement.naturalWidth;
                const h = imgElement.naturalHeight;

                const aspect = w / h;
                const baseScale = 2; // You can tweak this for overall size

                const imageEl = document.querySelector('a-image');
                if (imageEl) {
                    imageEl.setAttribute('scale', `${baseScale * aspect} ${baseScale} ${baseScale}`);
                }
            };
        }
    </script>

</body>

</html>
