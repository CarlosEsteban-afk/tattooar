<body>
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-assets>
            <img id="tattoo-img" src="" crossorigin="anonymous" />
        </a-assets>

        <a-marker preset="hiro">
            <a-image src="#tattoo-img" position="0 0.05 0" rotation="-90 0 0" scale="2 2 2"
                transparent="true"></a-image>


        </a-marker>

        <a-entity camera position="0 0 0" scale="1 1.5 1.5"></a-entity>
    </a-scene>
